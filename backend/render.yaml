services:
  - type: web
    name: noctual-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4 --timeout-keep-alive 120
    envVars:
      - key: RENDER_PYTHON_VERSION
        value: 3.12.10
      - key: ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: APP_BASE_URL
        value: https://med-ai-indol.vercel.app
      - key: BACKEND_BASE_URL
        sync: false
      - key: FREE_DAILY_AI_LIMIT
        value: 10
      - key: CORS_ORIGINS
        value: https://med-ai-indol.vercel.app,http://localhost:3000,https://*.vercel.app
healthCheckPath: /health
