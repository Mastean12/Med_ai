<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5CEB"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#f0f0ff"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B5CEB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#5B5CEB" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8B5CF6" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hologlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="24"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#5B5CEB" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="#5B5CEB" stroke-width="1"/>
  </g>

  <!-- Decorative gradient orbs -->
  <circle cx="680" cy="80" r="160" fill="#5B5CEB" opacity="0.04" filter="url(#glow)"/>
  <circle cx="150" cy="520" r="120" fill="#8B5CF6" opacity="0.04" filter="url(#glow)"/>

  <!-- ========== STUDENT FIGURE ========== -->
  <g filter="url(#shadow1)">
    <!-- Body silhouette -->
    <path d="M 480 280 Q 480 260 500 260 L 520 260 Q 540 260 540 280 L 540 380 L 480 380 Z" fill="#e8e8f0" opacity="0.5"/>

    <!-- Head -->
    <ellipse cx="510" cy="245" rx="24" ry="28" fill="#e0d5d0"/>
    <ellipse cx="510" cy="245" rx="24" ry="28" fill="#5B5CEB" opacity="0.03"/>

    <!-- Hair -->
    <path d="M 486 240 Q 486 215 510 212 Q 534 215 534 240 Q 534 225 520 222 Q 510 220 500 222 Q 486 225 486 240" fill="#3d3d4a"/>

    <!-- Face features -->
    <circle cx="502" cy="242" r="2.5" fill="#5B5CEB" opacity="0.3"/>
    <circle cx="518" cy="242" r="2.5" fill="#5B5CEB" opacity="0.3"/>
    <path d="M 505 252 Q 510 256 515 252" stroke="#5B5CEB" stroke-width="1.2" fill="none" opacity="0.3"/>

    <!-- Neck -->
    <rect x="503" y="270" width="14" height="14" rx="4" fill="#e0d5d0" opacity="0.6"/>

    <!-- Torso - white coat -->
    <path d="M 470 282 L 550 282 L 555 380 L 465 380 Z" fill="#f8f8ff" stroke="#e8e8f0" stroke-width="1"/>

    <!-- Collar -->
    <path d="M 500 282 L 510 310 L 520 282" fill="none" stroke="#d8d8e8" stroke-width="1.5"/>

    <!-- Arms -->
    <path d="M 470 290 Q 450 320 445 360" stroke="#f0f0f8" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 550 290 Q 565 310 570 340" stroke="#f0f0f8" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Hands on keyboard -->
    <ellipse cx="445" cy="365" rx="8" ry="6" fill="#e0d5d0"/>
    <ellipse cx="570" cy="345" rx="8" ry="6" fill="#e0d5d0"/>
  </g>

  <!-- ========== LAPTOP ========== -->
  <g filter="url(#shadow2)">
    <!-- Base -->
    <path d="M 395 370 L 400 395 L 615 395 L 620 370 Z" fill="#c0c0d0" stroke="#b0b0c0" stroke-width="1"/>
    <!-- Keyboard area -->
    <rect x="405" y="373" width="205" height="18" rx="2" fill="#d8d8e8"/>
    <!-- Keyboard keys -->
    <g opacity="0.4">
      <rect x="410" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="420" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="430" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="440" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="450" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="460" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="470" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="480" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="490" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="500" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="510" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="520" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="530" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="540" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="550" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="560" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="570" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="580" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
      <rect x="590" y="375" width="6" height="4" rx="0.5" fill="#b0b0c0"/>
    </g>
    <!-- Touchpad -->
    <rect x="470" y="379" width="80" height="8" rx="3" fill="#c8c8d8"/>

    <!-- Screen -->
    <path d="M 400 220 L 615 220 L 620 370 L 395 370 Z" fill="#1a1a2e"/>
    <!-- Screen gradient overlay -->
    <path d="M 400 220 L 615 220 L 620 370 L 395 370 Z" fill="url(#screenGlow)"/>

    <!-- ===== AI TUTOR INTERFACE ON SCREEN ===== -->
    <!-- Header bar -->
    <rect x="408" y="228" width="200" height="16" rx="3" fill="#5B5CEB" opacity="0.3"/>
    <circle cx="416" cy="236" r="3" fill="#5B5CEB"/>
    <text x="424" y="240" font-family="system-ui" font-size="6" fill="#c0c0e0" font-weight="600">AI Tutor</text>

    <!-- Live ECG waveform on screen -->
    <polyline points="420,248 425,265 430,248 435,262 440,248 445,260 450,248 455,258 460,248 465,256 470,248 475,254 480,248 485,252 490,248" stroke="#8B5CF6" stroke-width="1.5" fill="none" opacity="0.8"/>

    <!-- Left sidebar -->
    <rect x="408" y="265" width="50" height="55" rx="2" fill="#2a2a4e" opacity="0.3"/>
    <rect x="412" y="268" width="42" height="8" rx="2" fill="#5B5CEB" opacity="0.15"/>
    <rect x="412" y="280" width="42" height="6" rx="1" fill="#5B5CEB" opacity="0.08"/>
    <rect x="412" y="290" width="42" height="4" rx="1" fill="#5B5CEB" opacity="0.05"/>
    <rect x="412" y="297" width="42" height="4" rx="1" fill="#5B5CEB" opacity="0.05"/>

    <!-- Main content area -->
    <rect x="462" y="265" width="148" height="55" rx="2" fill="#2a2a4e" opacity="0.2"/>
    <!-- Chat bubbles -->
    <rect x="466" y="268" width="50" height="6" rx="2" fill="#5B5CEB" opacity="0.12"/>
    <rect x="466" y="278" width="60" height="6" rx="2" fill="#5B5CEB" opacity="0.08"/>
    <rect x="490" y="288" width="40" height="6" rx="2" fill="#8B5CF6" opacity="0.08"/>
    <rect x="466" y="298" width="55" height="6" rx="2" fill="#5B5CEB" opacity="0.12"/>

    <!-- Bottom status bar -->
    <rect x="408" y="325" width="200" height="12" rx="2" fill="#2a2a4e" opacity="0.15"/>
    <circle cx="414" cy="331" r="2" fill="#5B5CEB"/>
    <text x="420" y="334" font-family="system-ui" font-size="4" fill="#606080">Clinical Cardiology • 85% mastered</text>

    <!-- Progress bar -->
    <rect x="520" y="329" width="60" height="4" rx="2" fill="#2a2a4e" opacity="0.2"/>
    <rect x="520" y="329" width="40" height="4" rx="2" fill="#5B5CEB" opacity="0.6"/>

    <!-- Flashcard module -->
    <rect x="462" y="315" width="40" height="6" rx="2" fill="#8B5CF6" opacity="0.12"/>
  </g>

  <!-- ========== FLOATING HOLOGRAPHIC ELEMENTS ========== -->

  <!-- 1. HUMAN BRAIN (top-left) -->
  <g filter="url(#hologlow)" opacity="0.85">
    <path d="M 340 120 Q 350 105 370 110 Q 385 108 395 115 Q 410 110 420 120 Q 425 135 415 150 Q 420 165 410 175 Q 395 185 380 180 Q 365 185 350 175 Q 340 165 345 150 Q 335 135 340 120 Z" fill="url(#purpleGrad)" opacity="0.15" stroke="url(#purpleGrad)" stroke-width="1.5"/>
    <!-- Brain detail lines -->
    <path d="M 360 130 Q 370 125 380 135" stroke="url(#purpleGrad)" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 355 145 Q 370 140 385 150" stroke="url(#purpleGrad)" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M 365 160 Q 375 155 390 165" stroke="url(#purpleGrad)" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Brain glow ring -->
    <circle cx="380" cy="145" r="42" fill="none" stroke="#5B5CEB" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- 2. DNA HELIX (center-right) -->
  <g filter="url(#hologlow)" opacity="0.75" transform="translate(690, 220)">
    <g stroke="url(#purpleGrad)" stroke-width="2" fill="none">
      <path d="M 0 0 Q 15 15 0 30 Q -15 45 0 60 Q 15 75 0 90"/>
      <path d="M 20 0 Q 5 15 20 30 Q 35 45 20 60 Q 5 75 20 90"/>
    </g>
    <!-- DNA crosslinks -->
    <g stroke="url(#purpleGrad)" stroke-width="1" opacity="0.5">
      <line x1="0" y1="15" x2="20" y2="15"/>
      <line x1="20" y1="30" x2="0" y2="30"/>
      <line x1="0" y1="45" x2="20" y2="45"/>
      <line x1="20" y1="60" x2="0" y2="60"/>
      <line x1="0" y1="75" x2="20" y2="75"/>
    </g>
  </g>

  <!-- 3. ECG WAVEFORM (top-right) -->
  <g filter="url(#hologlow)" opacity="0.65">
    <polyline points="620,90 630,90 635,105 640,88 645,105 650,88 655,100 660,88 665,95 670,90 680,90" stroke="#8B5CF6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 4. ANATOMICAL HEART (center-left) -->
  <g filter="url(#hologlow)" opacity="0.7" transform="translate(280, 320)">
    <path d="M 25 5 Q 15 -5 5 5 Q -3 15 5 25 L 25 40 L 45 25 Q 53 15 45 5 Q 35 -5 25 5 Z" fill="url(#purpleGrad)" opacity="0.12" stroke="url(#purpleGrad)" stroke-width="1.5"/>
    <path d="M 15 10 Q 25 20 35 10" stroke="url(#purpleGrad)" stroke-width="0.8" fill="none" opacity="0.4"/>
    <circle cx="25" cy="18" r="2" fill="#5B5CEB" opacity="0.2"/>
  </g>

  <!-- 5. MICROSCOPE (bottom-right) -->
  <g filter="url(#hologlow)" opacity="0.6" transform="translate(640, 430)">
    <rect x="8" y="0" width="4" height="35" rx="1" fill="url(#purpleGrad)" opacity="0.2"/>
    <path d="M 0 35 L 20 35 L 24 42 L -4 42 Z" fill="url(#purpleGrad)" opacity="0.12" stroke="url(#purpleGrad)" stroke-width="1"/>
    <circle cx="10" cy="0" r="6" fill="none" stroke="url(#purpleGrad)" stroke-width="1.2" opacity="0.5"/>
    <rect x="6" y="28" width="8" height="3" rx="1" fill="url(#purpleGrad)" opacity="0.15"/>
    <line x1="10" y1="42" x2="10" y2="50" stroke="url(#purpleGrad)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- 6. MEDICAL BOOK (bottom-left) -->
  <g filter="url(#hologlow)" opacity="0.6" transform="translate(160, 420)">
    <rect x="0" y="5" width="30" height="40" rx="2" fill="url(#purpleGrad)" opacity="0.08" stroke="url(#purpleGrad)" stroke-width="1.2"/>
    <rect x="2" y="10" width="26" height="4" rx="1" fill="url(#purpleGrad)" opacity="0.1"/>
    <rect x="2" y="17" width="20" height="2" rx="1" fill="url(#purpleGrad)" opacity="0.06"/>
    <rect x="2" y="22" width="24" height="2" rx="1" fill="url(#purpleGrad)" opacity="0.06"/>
    <rect x="2" y="27" width="18" height="2" rx="1" fill="url(#purpleGrad)" opacity="0.04"/>
    <path d="M 30 5 L 33 8 L 33 48 L 30 45 Z" fill="url(#purpleGrad)" opacity="0.06"/>
    <text x="4" y="40" font-family="system-ui" font-size="4" fill="#5B5CEB" opacity="0.4" font-weight="600">MED</text>
  </g>

  <!-- 7. NEURAL NETWORK ICON (bottom-center) -->
  <g filter="url(#hologlow)" opacity="0.65" transform="translate(360, 460)">
    <circle cx="0" cy="0" r="2.5" fill="#5B5CEB" opacity="0.5"/>
    <circle cx="20" cy="-10" r="2" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="20" cy="10" r="2" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="-20" cy="-10" r="2" fill="#5B5CEB" opacity="0.4"/>
    <circle cx="-20" cy="10" r="2" fill="#5B5CEB" opacity="0.4"/>
    <circle cx="0" cy="-18" r="1.5" fill="#8B5CF6" opacity="0.3"/>
    <circle cx="0" cy="18" r="1.5" fill="#8B5CF6" opacity="0.3"/>
    <!-- Connections -->
    <g stroke="#5B5CEB" stroke-width="0.8" opacity="0.2">
      <line x1="0" y1="0" x2="20" y2="-10"/>
      <line x1="0" y1="0" x2="20" y2="10"/>
      <line x1="0" y1="0" x2="-20" y2="-10"/>
      <line x1="0" y1="0" x2="-20" y2="10"/>
      <line x1="0" y1="0" x2="0" y2="-18"/>
      <line x1="0" y1="0" x2="0" y2="18"/>
      <line x1="20" y1="-10" x2="20" y2="10"/>
      <line x1="-20" y1="-10" x2="-20" y2="10"/>
    </g>
  </g>

  <!-- 8. Floating AI chat bubbles -->
  <g opacity="0.5">
    <rect x="440" y="140" width="55" height="18" rx="8" fill="#f0f0ff" stroke="#5B5CEB" stroke-width="0.8" filter="url(#shadow2)"/>
    <text x="447" y="152" font-family="system-ui" font-size="5" fill="#5B5CEB" font-weight="600">AI Chat</text>
  </g>
  <g opacity="0.4">
    <rect x="535" y="165" width="65" height="18" rx="8" fill="#f5f0ff" stroke="#8B5CF6" stroke-width="0.8" filter="url(#shadow2)"/>
    <text x="542" y="177" font-family="system-ui" font-size="5" fill="#8B5CF6" font-weight="600">Flashcards</text>
  </g>
  <g opacity="0.35">
    <rect x="555" y="135" width="50" height="18" rx="8" fill="#f0f0ff" stroke="#5B5CEB" stroke-width="0.8" filter="url(#shadow2)"/>
    <text x="562" y="147" font-family="system-ui" font-size="5" fill="#5B5CEB" font-weight="600">Exams</text>
  </g>

  <!-- Pulsing outer glow ring -->
  <circle cx="500" cy="300" r="200" fill="none" stroke="#5B5CEB" stroke-width="0.5" opacity="0.04"/>
  <circle cx="500" cy="300" r="160" fill="none" stroke="#8B5CF6" stroke-width="0.3" opacity="0.03"/>
</svg>
